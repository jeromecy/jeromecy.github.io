<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Jekyll to Quarto migration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#134e4a"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3">
    <circle cx="120" cy="80" r="130"/>
    <circle cx="720" cy="400" r="160"/>
  </g>
  <g font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="235" y="235" font-size="52" font-weight="700" fill="#ffffff" fill-opacity="0.85">.md</text>
    <text x="400" y="232" font-size="46" font-weight="700" fill="#99f6e4">→</text>
    <text x="565" y="235" font-size="52" font-weight="700" fill="#ffffff">.qmd</text>
  </g>
  <text x="400" y="330" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="30" font-weight="600" fill="#ffffff" fill-opacity="0.9" text-anchor="middle">Jekyll → Quarto</text>
</svg>
