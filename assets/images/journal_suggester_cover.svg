<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Journal Suggester">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#115e59"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="3">
    <circle cx="650" cy="90" r="120"/>
    <circle cx="700" cy="380" r="170"/>
    <circle cx="90" cy="400" r="140"/>
  </g>
  <!-- stack of journals -->
  <g transform="translate(280,120)">
    <rect x="30" y="150" width="180" height="26" rx="5" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="18" y="112" width="204" height="26" rx="5" fill="#ffffff" fill-opacity="0.75"/>
    <rect x="6" y="74" width="228" height="26" rx="5" fill="#ffffff" fill-opacity="0.9"/>
    <rect x="0" y="0" width="240" height="62" rx="8" fill="#ffffff"/>
    <rect x="18" y="18" width="130" height="10" rx="5" fill="#0d9488"/>
    <rect x="18" y="36" width="90" height="8" rx="4" fill="#99f6e4"/>
  </g>
  <text x="400" y="360" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">Find the right journal</text>
</svg>
