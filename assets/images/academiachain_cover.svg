<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="AcademiaChain constellation graph">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0" stop-color="#134e4a"/>
      <stop offset="1" stop-color="#0b1220"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#5eead4" stop-opacity="1"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- faint background stars -->
  <g fill="#ffffff">
    <circle cx="60" cy="60" r="1.4" opacity="0.6"/>
    <circle cx="120" cy="140" r="1" opacity="0.5"/>
    <circle cx="740" cy="70" r="1.6" opacity="0.7"/>
    <circle cx="690" cy="160" r="1" opacity="0.5"/>
    <circle cx="50" cy="330" r="1.2" opacity="0.6"/>
    <circle cx="150" cy="390" r="1" opacity="0.4"/>
    <circle cx="770" cy="340" r="1.3" opacity="0.6"/>
    <circle cx="620" cy="400" r="1" opacity="0.5"/>
    <circle cx="400" cy="40" r="1" opacity="0.5"/>
    <circle cx="300" cy="410" r="1.1" opacity="0.5"/>
  </g>

  <!-- constellation edges -->
  <g stroke="#5eead4" fill="none" stroke-linecap="round">
    <line x1="180" y1="150" x2="330" y2="110" stroke-width="2" stroke-opacity="0.55"/>
    <line x1="330" y1="110" x2="480" y2="170" stroke-width="3.5" stroke-opacity="0.8"/>
    <line x1="480" y1="170" x2="620" y2="130" stroke-width="1.6" stroke-opacity="0.4"/>
    <line x1="330" y1="110" x2="360" y2="260" stroke-width="1.6" stroke-opacity="0.4"/>
    <line x1="360" y1="260" x2="480" y2="170" stroke-width="2.4" stroke-opacity="0.6"/>
    <line x1="360" y1="260" x2="230" y2="300" stroke-width="1.6" stroke-opacity="0.45"/>
    <line x1="480" y1="170" x2="560" y2="290" stroke-width="1.6" stroke-opacity="0.4"/>
  </g>

  <!-- constellation nodes (glowing stars) -->
  <g>
    <circle cx="180" cy="150" r="20" fill="url(#glow)"/>
    <circle cx="180" cy="150" r="5" fill="#f0fdfa"/>

    <circle cx="330" cy="110" r="26" fill="url(#glow)"/>
    <circle cx="330" cy="110" r="6.5" fill="#f0fdfa"/>

    <circle cx="480" cy="170" r="30" fill="url(#glow)"/>
    <circle cx="480" cy="170" r="7.5" fill="#f0fdfa"/>

    <circle cx="620" cy="130" r="18" fill="url(#glow)"/>
    <circle cx="620" cy="130" r="4.5" fill="#f0fdfa"/>

    <circle cx="360" cy="260" r="22" fill="url(#glow)"/>
    <circle cx="360" cy="260" r="5.5" fill="#f0fdfa"/>

    <circle cx="230" cy="300" r="16" fill="url(#glow)"/>
    <circle cx="230" cy="300" r="4" fill="#f0fdfa"/>

    <circle cx="560" cy="290" r="16" fill="url(#glow)"/>
    <circle cx="560" cy="290" r="4" fill="#f0fdfa"/>
  </g>

  <text x="400" y="390" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">AcademiaChain</text>
  <text x="400" y="418" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="16" fill="#99f6e4" text-anchor="middle">Your Erdős number, generalized</text>
</svg>
